# Dependabot — automated dependency update PRs.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # ── Go modules (backend) ──────────────────────────────
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(go):"
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 10
    groups:
      go-minor:
        update-types:
          - minor
          - patch

  # ── npm (frontend) ────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(npm):"
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 10
    groups:
      npm-minor:
        update-types:
          - minor
          - patch

  # ── GitHub Actions ────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(actions):"
    labels:
      - dependencies
      - ci

  # ── Docker (backend + frontend Dockerfiles) ───────────
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"
    labels:
      - dependencies
      - docker

