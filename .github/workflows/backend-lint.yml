name: "Backend · Lint"

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    paths: [backend/**]

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: backend

