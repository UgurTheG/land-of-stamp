name: "Backend · Bazel"

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    paths: [backend/**]

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  # ── Build all targets ─────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-build-${{ runner.os }}-${{ hashFiles('backend/MODULE.bazel', 'backend/MODULE.bazel.lock') }}
          restore-keys: bazel-build-${{ runner.os }}-

      - name: Build
        run: bazelisk build --config=ci //...

  # ── Run all tests ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-test-${{ runner.os }}-${{ hashFiles('backend/MODULE.bazel', 'backend/MODULE.bazel.lock') }}
          restore-keys: bazel-test-${{ runner.os }}-

      - name: Test
        run: bazelisk test --config=ci //...

  # ── Gazelle dirty check (BUILD files up to date) ───────
  gazelle:
    name: Gazelle dirty check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-gazelle-${{ runner.os }}-${{ hashFiles('backend/MODULE.bazel', 'backend/MODULE.bazel.lock') }}
          restore-keys: bazel-gazelle-${{ runner.os }}-

      - name: Run Gazelle (update BUILD files)
        run: bazelisk run --config=ci //:gazelle -- update

      - name: Check for differences
        run: |
          git diff --exit-code -- '*.bazel' 'MODULE.bazel' || {
            echo "::error::BUILD files are out of date. Run 'bazel run //:gazelle' in backend/ and commit."
            git diff -- '*.bazel' 'MODULE.bazel'
            exit 1
          }

  # ── Lint (golangci-lint — runs outside Bazel) ─────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend

  # ── Vulnerability scan (weekly + on push) ─────────────
  security:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

