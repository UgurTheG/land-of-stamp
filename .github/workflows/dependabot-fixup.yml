name: "Deps · Dependabot Fixup"

# Regenerate Bazel BUILD files (and lock) after Dependabot
# bumps a Go module, then push the fix back to the PR branch
# so the normal CI checks pass.

on:
  pull_request_target:
    paths: [backend/go.mod, backend/go.sum]

concurrency:
  group: dependabot-fixup-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write       # push the fixup commit
  pull-requests: read

jobs:
  fixup:
    name: Regenerate BUILD files
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}   # check out the PR branch, not base
          fetch-depth: 2                # need parent for diff

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-fixup-${{ runner.os }}-${{ hashFiles('backend/MODULE.bazel', 'backend/MODULE.bazel.lock') }}
          restore-keys: bazel-fixup-${{ runner.os }}-

      - name: Run Gazelle
        working-directory: backend
        run: bazelisk run --config=ci //:gazelle -- update

      - name: Update MODULE.bazel.lock
        working-directory: backend
        run: bazelisk mod deps --lockfile_mode=update 2>/dev/null || true

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- backend/
          git diff --cached --quiet || {
            git commit -m "deps(go): regenerate BUILD files"
            git push
          }

