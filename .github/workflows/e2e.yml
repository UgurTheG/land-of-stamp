name: "E2E · Playwright"

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6


      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: bazel-e2e-${{ runner.os }}-${{ hashFiles('backend/MODULE.bazel', 'backend/MODULE.bazel.lock') }}
          restore-keys: bazel-e2e-${{ runner.os }}-

      - name: Build backend
        working-directory: backend
        run: bazelisk build --config=ci //:server

      - name: Start backend
        working-directory: backend
        run: |
          DB_PATH=:memory: JWT_SECRET=e2e-ci-secret TEST_SEED=true ./bazel-bin/server_/server &
          sleep 2

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm run dev -- --port 5173 &
          npx wait-on http://localhost:5173 --timeout 15000

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

