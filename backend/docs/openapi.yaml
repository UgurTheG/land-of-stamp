openapi: "3.1.0"
info:
  title: "Länd of Stamp API"
  version: 2.0.0
  description: |
    Digital stamp-card platform — collect stamps at local shops, redeem rewards.
    All endpoints use **ConnectRPC** (JSON over HTTP POST).
    Request and response bodies follow the protobuf JSON mapping.
    ### Authentication
    Most RPCs require an **HttpOnly cookie** (`__token`) containing a JWT.
    Register / Login accept `username` and `password` fields in the request body
    and return the JWT cookie via `Set-Cookie`.
    ### Roles
    | Role | Capabilities |
    |------|-------------|
    | `user` | View shops, collect stamps, redeem rewards |
    | `admin` | Create/manage shops, grant stamps, generate QR codes |
  contact:
    name: UgurTheG
    url: https://github.com/UgurTheG/land-of-stamp
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: Registration, login, logout, session
  - name: Shops
    description: Shop listing and management
  - name: Stamps
    description: Stamp cards, granting, redeeming
  - name: QR
    description: QR-code token flow for contactless stamp collection
  - name: Docs
    description: API documentation
paths:
  # ── AuthService ─────────────────────────────────────────────────────────
  /landofstamp.v1.AuthService/Register:
    post:
      operationId: AuthService_Register
      tags: [Auth]
      summary: Register a new user
      description: Creates a new user account and returns a JWT cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User created
          headers:
            Set-Cookie:
              description: HttpOnly JWT cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Username already taken
  /landofstamp.v1.AuthService/Login:
    post:
      operationId: AuthService_Login
      tags: [Auth]
      summary: Log in
      description: Validates credentials and returns a JWT cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          headers:
            Set-Cookie:
              description: HttpOnly JWT cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
  /landofstamp.v1.AuthService/Logout:
    post:
      operationId: AuthService_Logout
      tags: [Auth]
      summary: Log out
      description: Clears the JWT cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /landofstamp.v1.AuthService/GetMe:
    post:
      operationId: AuthService_GetMe
      tags: [Auth]
      summary: Get current user
      description: Returns the authenticated user's profile.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
  # ── ShopService ─────────────────────────────────────────────────────────
  /landofstamp.v1.ShopService/ListShops:
    post:
      operationId: ShopService_ListShops
      tags: [Shops]
      summary: List all shops
      description: Returns all shops. Public — no auth required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Shop list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopList"
  /landofstamp.v1.ShopService/CreateShop:
    post:
      operationId: ShopService_CreateShop
      tags: [Shops]
      summary: Create a shop
      description: Admin only — creates a new shop.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShopRequest"
      responses:
        "200":
          description: Shop created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"
        "403":
          description: Admin role required
  /landofstamp.v1.ShopService/UpdateShop:
    post:
      operationId: ShopService_UpdateShop
      tags: [Shops]
      summary: Update shop details
      description: Admin only — updates an existing shop.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShopRequest"
      responses:
        "200":
          description: Shop updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"
        "403":
          description: Admin role required
  /landofstamp.v1.ShopService/GetMyShops:
    post:
      operationId: ShopService_GetMyShops
      tags: [Shops]
      summary: Get admin's shops
      description: Admin only — returns shops owned by the authenticated admin.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Admin's shops
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopList"
        "403":
          description: Admin role required
  # ── StampService ────────────────────────────────────────────────────────
  /landofstamp.v1.StampService/GetMyCards:
    post:
      operationId: StampService_GetMyCards
      tags: [Stamps]
      summary: Get user's stamp cards
      description: Returns all stamp cards for the authenticated user.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: User's cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampCardList"
  /landofstamp.v1.StampService/JoinShop:
    post:
      operationId: StampService_JoinShop
      tags: [Stamps]
      summary: Join a shop
      description: Creates a stamp card for the user at the specified shop.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinShopRequest"
      responses:
        "200":
          description: Stamp card created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampCard"
  /landofstamp.v1.StampService/GetShopCards:
    post:
      operationId: StampService_GetShopCards
      tags: [Stamps]
      summary: Get cards for a shop
      description: Admin only — returns all stamp cards for a shop.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetShopCardsRequest"
      responses:
        "200":
          description: Shop cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampCardList"
  /landofstamp.v1.StampService/GrantStamp:
    post:
      operationId: StampService_GrantStamp
      tags: [Stamps]
      summary: Grant a stamp
      description: Admin only — grants one stamp to a user at the specified shop.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantStampRequest"
      responses:
        "200":
          description: Stamp granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampCard"
  /landofstamp.v1.StampService/UpdateStampCount:
    post:
      operationId: StampService_UpdateStampCount
      tags: [Stamps]
      summary: Set stamp count
      description: Admin only — sets the stamp count for a user at a shop.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStampCountRequest"
      responses:
        "200":
          description: Stamp count updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampCard"
  /landofstamp.v1.StampService/RedeemCard:
    post:
      operationId: StampService_RedeemCard
      tags: [Stamps]
      summary: Redeem a full stamp card
      description: Redeems a completed stamp card for the reward.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemCardRequest"
      responses:
        "200":
          description: Card redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /landofstamp.v1.StampService/GetShopCustomers:
    post:
      operationId: StampService_GetShopCustomers
      tags: [Stamps]
      summary: List shop customers
      description: Admin only — returns users who have a card at the shop.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetShopCustomersRequest"
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
  /landofstamp.v1.StampService/CreateStampToken:
    post:
      operationId: StampService_CreateStampToken
      tags: [QR]
      summary: Create a QR stamp token
      description: |
        Admin only — generates a one-time token that a user can scan
        (via QR code) to collect a stamp.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStampTokenRequest"
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampToken"
  /landofstamp.v1.StampService/GetStampTokenStatus:
    post:
      operationId: StampService_GetStampTokenStatus
      tags: [QR]
      summary: Check stamp token status
      description: Admin only — check whether a stamp token is active.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetStampTokenStatusRequest"
      responses:
        "200":
          description: Token status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampTokenStatusResponse"
  /landofstamp.v1.StampService/ClaimStamp:
    post:
      operationId: StampService_ClaimStamp
      tags: [QR]
      summary: Claim a stamp via token
      description: |
        User only — redeems a one-time token (from a QR code) to collect a stamp.
        The token is invalidated after first use.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimStampRequest"
      responses:
        "200":
          description: Stamp claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimStampResponse"
        "400":
          description: Empty token
        "404":
          description: Token not found or expired
  # ── DocsService ─────────────────────────────────────────────────────────
  /landofstamp.v1.DocsService/GetOpenAPISpec:
    post:
      operationId: DocsService_GetOpenAPISpec
      tags: [Docs]
      summary: Get OpenAPI spec
      description: Returns the raw OpenAPI 3.1 YAML specification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OpenAPI spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOpenAPISpecResponse"
  /landofstamp.v1.DocsService/GetDocsPage:
    post:
      operationId: DocsService_GetDocsPage
      tags: [Docs]
      summary: Get docs UI page
      description: Returns a self-contained Scalar HTML page with the spec inlined.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: HTML docs page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDocsPageResponse"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __token
      description: HttpOnly JWT cookie set by Register / Login
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: coffeelover
        role:
          type: string
          enum: [user, admin]
        shopId:
          type: string
          format: uuid
          nullable: true
      required: [id, username, role]
    Shop:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Bean There Coffee
        description:
          type: string
        rewardDescription:
          type: string
          example: Free latte after 8 stamps
        stampsRequired:
          type: integer
          minimum: 2
          maximum: 20
          example: 8
        color:
          type: string
          example: "#6366f1"
        ownerId:
          type: string
          format: uuid
      required: [id, name, rewardDescription, stampsRequired, color, ownerId]
    StampCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        shopId:
          type: string
          format: uuid
        stamps:
          type: integer
          example: 3
        redeemed:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, userId, shopId, stamps, redeemed]
    StampToken:
      type: object
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
        shopId:
          type: string
          format: uuid
      required: [token, expiresAt, shopId]
    ShopList:
      type: object
      properties:
        shops:
          type: array
          items:
            $ref: "#/components/schemas/Shop"
    StampCardList:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: "#/components/schemas/StampCard"
    UserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 2
        password:
          type: string
          minLength: 4
        role:
          type: string
          enum: [user, admin]
          default: user
      required: [username, password]
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]
    CreateShopRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        rewardDescription:
          type: string
        stampsRequired:
          type: integer
          minimum: 2
          maximum: 20
          default: 8
        color:
          type: string
          default: "#6366f1"
      required: [name, rewardDescription]
    UpdateShopRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        rewardDescription:
          type: string
        stampsRequired:
          type: integer
        color:
          type: string
      required: [id]
    JoinShopRequest:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
      required: [shopId]
    GetShopCardsRequest:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
      required: [shopId]
    GrantStampRequest:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
      required: [shopId, userId]
    UpdateStampCountRequest:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        stamps:
          type: integer
          minimum: 0
      required: [shopId, userId, stamps]
    RedeemCardRequest:
      type: object
      properties:
        cardId:
          type: string
          format: uuid
      required: [cardId]
    GetShopCustomersRequest:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
      required: [shopId]
    CreateStampTokenRequest:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
      required: [shopId]
    GetStampTokenStatusRequest:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
      required: [shopId]
    ClaimStampRequest:
      type: object
      properties:
        token:
          type: string
      required: [token]
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    ClaimStampResponse:
      type: object
      properties:
        shopName:
          type: string
        stamps:
          type: integer
        stampsRequired:
          type: integer
        message:
          type: string
    StampTokenStatusResponse:
      type: object
      properties:
        active:
          type: boolean
        expiresAt:
          type: string
          format: date-time
    GetOpenAPISpecResponse:
      type: object
      properties:
        content:
          type: string
          description: Raw YAML spec content
        contentType:
          type: string
          example: application/yaml
    GetDocsPageResponse:
      type: object
      properties:
        html:
          type: string
          description: Self-contained Scalar HTML page
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: ConnectRPC error code
          example: unauthenticated
        message:
          type: string
