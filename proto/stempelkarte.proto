syntax = "proto3";

package landofstamp.v1;

option go_package = "land-of-stamp-backend/gen/pb";

// ── Entities ───────────────────────────────────────────

message User {
  string id = 1;
  string username = 2;
  string role = 3;          // "user" | "admin"
  optional string shop_id = 4;
  string display_name = 5;
  string avatar_url = 6;
}

message Shop {
  string id = 1;
  string name = 2;
  string description = 3;
  string reward_description = 4;
  int32  stamps_required = 5;
  string color = 6;
  string owner_id = 7;
}

message StampCard {
  string id = 1;
  string user_id = 2;
  string shop_id = 3;
  int32  stamps = 4;
  bool   redeemed = 5;
  string created_at = 6;
}

// ── Auth ───────────────────────────────────────────────


message LogoutRequest {}

message GetMeRequest {}

message ChooseRoleRequest {
  string role = 1; // "user" | "admin"
}

message UpdateProfileRequest {
  string display_name = 1;
}

message UploadProfilePictureRequest {
  string mime_type = 1;   // e.g. image/png
  string data_base64 = 2; // base64 image bytes (no data-url prefix)
}

message DeleteProfilePictureRequest {}

message DeleteAccountRequest {}

message GetProfileStatsRequest {}

message ProfileStatsResponse {
  int32 joined_shops = 1;
  int32 active_cards = 2;
  int32 redeemed_cards = 3;
  int32 total_stamps = 4;
}

// ── Shops ──────────────────────────────────────────────

message ListShopsRequest {}

message CreateShopRequest {
  string name = 1;
  string description = 2;
  string reward_description = 3;
  int32  stamps_required = 4;
  string color = 5;
}

message UpdateShopRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string reward_description = 4;
  int32  stamps_required = 5;
  string color = 6;
}

message GetMyShopsRequest {}

message ShopList {
  repeated Shop shops = 1;
}

// ── Stamps ─────────────────────────────────────────────

message GetMyCardsRequest {}

message JoinShopRequest {
  string shop_id = 1;
}

message GetShopCardsRequest {
  string shop_id = 1;
}

message GrantStampRequest {
  string shop_id = 1;
  string user_id = 2;
}

message UpdateStampCountRequest {
  string shop_id = 1;
  string user_id = 2;
  int32  stamps = 3;
}

message RedeemCardRequest {
  string card_id = 1;
}

message GetShopCustomersRequest {
  string shop_id = 1;
}

message StampCardList {
  repeated StampCard cards = 1;
}

// ── QR / Tokens ────────────────────────────────────────

message CreateStampTokenRequest {
  string shop_id = 1;
}

message GetStampTokenStatusRequest {
  string shop_id = 1;
}

message StampTokenStatusResponse {
  bool   active = 1;
  string expires_at = 2;
}

message StampToken {
  string token = 1;
  string expires_at = 2;
  string shop_id = 3;
}

message ClaimStampRequest {
  string token = 1;
}

message ClaimStampResponse {
  string shop_name = 1;
  int32  stamps = 2;
  int32  stamps_required = 3;
  string message = 4;
}

// ── Generic ────────────────────────────────────────────

message UserList {
  repeated User users = 1;
}

message StatusResponse {
  string status = 1;
}

message ErrorResponse {
  string error = 1;
}

// ── Docs ───────────────────────────────────────────────

message GetOpenAPISpecRequest {}
message GetOpenAPISpecResponse {
  string content = 1;      // Raw YAML
  string content_type = 2; // e.g. "application/yaml"
}

message GetDocsPageRequest {}
message GetDocsPageResponse {
  string html = 1;         // Self-contained Scalar HTML page
}

// ── Services ───────────────────────────────────────────

service DocsService {
  rpc GetOpenAPISpec(GetOpenAPISpecRequest) returns (GetOpenAPISpecResponse);
  rpc GetDocsPage(GetDocsPageRequest) returns (GetDocsPageResponse);
}

service AuthService {
  rpc Logout(LogoutRequest) returns (StatusResponse);
  rpc GetMe(GetMeRequest) returns (User);
  rpc ChooseRole(ChooseRoleRequest) returns (User);
  rpc UpdateProfile(UpdateProfileRequest) returns (User);
  rpc UploadProfilePicture(UploadProfilePictureRequest) returns (User);
  rpc DeleteProfilePicture(DeleteProfilePictureRequest) returns (User);
  rpc GetProfileStats(GetProfileStatsRequest) returns (ProfileStatsResponse);
  rpc DeleteAccount(DeleteAccountRequest) returns (StatusResponse);
}

service ShopService {
  rpc ListShops(ListShopsRequest) returns (ShopList);
  rpc CreateShop(CreateShopRequest) returns (Shop);
  rpc UpdateShop(UpdateShopRequest) returns (Shop);
  rpc GetMyShops(GetMyShopsRequest) returns (ShopList);
}

service StampService {
  rpc GetMyCards(GetMyCardsRequest) returns (StampCardList);
  rpc JoinShop(JoinShopRequest) returns (StampCard);
  rpc GetShopCards(GetShopCardsRequest) returns (StampCardList);
  rpc GrantStamp(GrantStampRequest) returns (StampCard);
  rpc UpdateStampCount(UpdateStampCountRequest) returns (StampCard);
  rpc RedeemCard(RedeemCardRequest) returns (StatusResponse);
  rpc GetShopCustomers(GetShopCustomersRequest) returns (UserList);
  rpc CreateStampToken(CreateStampTokenRequest) returns (StampToken);
  rpc GetStampTokenStatus(GetStampTokenStatusRequest) returns (StampTokenStatusResponse);
  rpc ClaimStamp(ClaimStampRequest) returns (ClaimStampResponse);
}
