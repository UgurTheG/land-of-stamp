syntax = "proto3";

package landofstamp.v1;

option go_package = "land-of-stamp-backend/gen/pb";

// ── Entities ───────────────────────────────────────────

message User {
  string id = 1;
  string username = 2;
  string role = 3;          // "user" | "admin"
  optional string shop_id = 4;
}

message Shop {
  string id = 1;
  string name = 2;
  string description = 3;
  string reward_description = 4;
  int32  stamps_required = 5;
  string color = 6;
  string owner_id = 7;
}

message StampCard {
  string id = 1;
  string user_id = 2;
  string shop_id = 3;
  int32  stamps = 4;
  bool   redeemed = 5;
  string created_at = 6;
}

// ── Auth ───────────────────────────────────────────────

message RegisterRequest {
  string role = 1;  // credentials come via Basic auth header, not body
}

message AuthResponse {
  User user = 1;
}

// ── Shops ──────────────────────────────────────────────

message CreateShopRequest {
  string name = 1;
  string description = 2;
  string reward_description = 3;
  int32  stamps_required = 4;
  string color = 5;
}

message ShopList {
  repeated Shop shops = 1;
}

// ── Stamps ─────────────────────────────────────────────

message GrantStampRequest {
  string user_id = 1;
}

message UpdateStampCountRequest {
  string user_id = 1;
  int32  stamps = 2;
}

message StampCardList {
  repeated StampCard cards = 1;
}

// ── QR / Tokens ────────────────────────────────────────

message StampToken {
  string token = 1;
  string expires_at = 2;
  string shop_id = 3;
}

message ClaimStampRequest {
  string token = 1;
}

message ClaimStampResponse {
  string shop_name = 1;
  int32  stamps = 2;
  int32  stamps_required = 3;
  string message = 4;
}

// ── Generic ────────────────────────────────────────────

message UserList {
  repeated User users = 1;
}

message StatusResponse {
  string status = 1;
}

message ErrorResponse {
  string error = 1;
}
